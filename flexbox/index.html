<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }

      .parent {
        background-color: aqua;
        display: flex;

        gap: 1px;
        display: flex;
        height: 100vh;
        
      }

      .child {
        padding: 5px;
        font-size: xx-large;
        background-color: brown;
        flex: 1;
        
      }

      .child:nth-child(1){
        flex-grow: 1;
      }

      .child:nth-child(2){
        flex-grow: 2;
      }

      .child:nth-child(3){
        flex-grow: 1;
      }

      .child:nth-child(4){
        flex-grow: 2;
      }

      .child:nth-child(5){
        flex-grow: 1;
      }
      
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child">1</div>
      <div class="child">2
      </div>
      <div class="child">3</div>
      <div class="child">4</div>
      <div class="child">5</div>
    </div>
  </body>
</html>
